let currentUser = null;   // Supabase auth user
let currentProfile = null; // profiles table row (has role, name, etc.)

// ── LOGIN SCREEN ─────────────────────────────────────────
function renderLogin(errorMsg='', mode='login') {
  document.getElementById('root').innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">Sonroc Care</div>
        <div class="login-sub">Perfect Stay Group — Staff Portal</div>
        ${errorMsg ? '<div class="login-err" style="display:block">' + errorMsg + '</div>' : ''}
        ${mode === 'forgot' ? `
          <div class="login-info">Enter your email and we'll send you a password reset link.</div>
          <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="resetEmail" placeholder="you@sonroc.com"></div>
          <button class="login-btn" id="resetBtn" onclick="handleReset()">Send Reset Link</button>
          <div class="login-forgot"><a href="#" onclick="renderLogin();return false">← Back to login</a></div>
        ` : mode === 'change' ? `
          <div class="login-info">Set your new password.</div>
          <div class="fg"><label class="fl">New Password</label><input class="fi" type="password" id="newPass" placeholder="New password (min 6 characters)"></div>
          <div class="fg"><label class="fl">Confirm Password</label><input class="fi" type="password" id="confirmPass" placeholder="Confirm new password"></div>
          <button class="login-btn" onclick="handleChangePassword()">Update Password</button>
        ` : `
          <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="loginEmail" placeholder="you@sonroc.com"></div>
          <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="loginPass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')handleLogin()"></div>
          <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
          <div class="login-forgot"><a href="#" onclick="renderLogin('','forgot');return false">Forgot password?</a></div>
        `}
      </div>
    </div>`;
}

async function handleLogin() {
  const email = document.getElementById('loginEmail')?.value?.trim();
  const pass = document.getElementById('loginPass')?.value;
  if (!email || !pass) { renderLogin('Please enter your email and password.'); return; }
  const btn = document.getElementById('loginBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in...'; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { renderLogin(error.message); return; }
  await loadUserAndStart();
}

async function handleReset() {
  const email = document.getElementById('resetEmail')?.value?.trim();
  if (!email) { renderLogin('Please enter your email.', 'forgot'); return; }
  const btn = document.getElementById('resetBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin
  });
  if (error) { renderLogin(error.message, 'forgot'); return; }
  renderLogin('Check your email for the reset link. It may take a minute.', 'forgot');
}

async function handleChangePassword() {
  const pass = document.getElementById('newPass')?.value;
  const confirm = document.getElementById('confirmPass')?.value;
  if (!pass || pass.length < 6) { renderLogin('Password must be at least 6 characters.', 'change'); return; }
  if (pass !== confirm) { renderLogin('Passwords do not match.', 'change'); return; }
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) { renderLogin(error.message, 'change'); return; }
  await loadUserAndStart();
}

async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  renderLogin();
}

async function loadUserAndStart() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { renderLogin(); return; }
  currentUser = user;
  // Load profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  if (profile) {
    // Set the app role based on database profile
    S.role = profile.role || 'dsp';
    S.currentUserId = user.id;
    S.currentUserName = profile.name || user.email;
    S.currentUserEmail = user.email;
    S.currentUserRole = profile.role || 'dsp';
  }
  // Start the app
  render();
}

// ── INIT: Check session on page load ─────────────────────
async function initAuth() {
  // Check for password recovery flow (URL has type=recovery)
  const params = new URLSearchParams(window.location.hash.substring(1));
  const type = params.get('type');
  if (type === 'recovery') {
    renderLogin('', 'change');
    return;
  }
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserAndStart();
  } else {
    renderLogin();
  }
}

// Returns null if ok to clock in, or an error string if too early
// shift is "HH:MM-HH:MM" or "HH:MM" (start time)
function canClockIn(startTimeStr){
  if(!startTimeStr)return null; // no scheduled shift = manual, always allow
  // parse start out of "07:00-15:00" or bare "07:00"
  const start=startTimeStr.split('-')[0].trim();
  const[sh,sm]=(start.match(/^(\d{1,2}):(\d{2})/)||[]).slice(1).map(Number);
  if(isNaN(sh))return null; // can't parse, allow
  const now=new Date();
  const shiftMinutes=sh*60+sm;
  const nowMinutes=now.getHours()*60+now.getMinutes();
  const diff=shiftMinutes-nowMinutes; // positive = shift is in the future
  if(diff>10){
    const opens=sh*60+sm-10;
    const hh=Math.floor(opens/60).toString().padStart(2,'0');
    const mm=(opens%60).toString().padStart(2,'0');
    return'Too early to clock in. Your shift starts at '+start+'. You can clock in from '+hh+':'+mm+' (10 minutes before).';
  }
  return null;
}

function clockIn(sid,shift,loc){
  const earlyErr=canClockIn(shift);
  if(earlyErr){alert(earlyErr);return;}
  const t=nowT(),d=today();
  S.activeClock[sid]={clockIn:t,shift,location:loc,date:d};
  S.clockRecords.push({id:Date.now(),staffId:sid,date:d,clockIn:t,clockOut:null,shift,location:loc,reportSubmitted:false});
  audit('Time Clock','Clock In',`${gs(sid)?.name} clocked in at ${t} · ${shift} · ${loc}`);
  cm();
}
function clockOut(sid){
  const ac=S.activeClock[sid];
  const hasRpt=S.shiftReports.some(r=>r.staffId===sid&&r.date===ac.date&&r.shift===ac.shift);
  if(!hasRpt){S.clockOutStaffId=sid;om('blockClockOut');return;}
  const rec=S.clockRecords.filter(r=>r.staffId===sid&&!r.clockOut).pop();
  const outT=nowT();
  if(rec){rec.clockOut=outT;rec.reportSubmitted=true;}
  delete S.activeClock[sid];
  audit('Time Clock','Clock Out',`${gs(sid)?.name} clocked out at ${outT}`);
  render();
}

// Convert "HH:MM" to minutes since midnight
function toMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}

// Map day name to date offset from Mon Apr 14 2026 (our demo week)
const WEEK_START=new Date('2026-04-14');
function dayToDate(dayName){
  const idx=days.indexOf(dayName);
  const d=new Date(WEEK_START);d.setDate(d.getDate()+idx);
  return d.toISOString().slice(0,10);
}
function dateToDayName(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const diff=Math.round((d-WEEK_START)/(1000*60*60*24));
  return diff>=0&&diff<7?days[diff]:null;
}

// Returns approved RTO record if staff has approved time off covering this day
function getRTO(staffId,dayName){
  const dateStr=dayToDate(dayName);
  return S.timeOff.find(t=>t.staffId===staffId&&t.status==='Approved'&&t.start<=dateStr&&t.end>=dateStr)||null;
}

// Returns overlapping shift label if new start/end overlaps any existing shift on that day by >1 min
function getOverlap(sid,day,newStart,newEnd,excludeIdx=null){
  const dayShifts=S.schedule[sid]&&S.schedule[sid][day];
  if(!dayShifts)return null;
  const shifts=Array.isArray(dayShifts)?dayShifts:[dayShifts];
  const ns=toMin(newStart),ne=toMin(newEnd);
  // Handle overnight: if end <= start treat end as next-day (add 1440)
  const neAdj=ne<=ns?ne+1440:ne;
  for(let i=0;i<shifts.length;i++){
    if(excludeIdx!==null&&i===excludeIdx)continue;
    const es=toMin(shifts[i].startTime),ee=toMin(shifts[i].endTime);
    const eeAdj=ee<=es?ee+1440:ee;
    // Overlap if intervals intersect by more than 1 minute
    const overlapMin=Math.min(neAdj,eeAdj)-Math.max(ns,es);
    if(overlapMin>1)return shifts[i].startTime+'-'+shifts[i].endTime+' at '+shifts[i].location;
  }
  return null;
}

function submitShift(){
  const sid=parseInt(document.getElementById('ssS')?.value);
  const day=document.getElementById('ssD')?.value;
  const startTime=document.getElementById('ssStart')?.value;
  const endTime=document.getElementById('ssEnd')?.value;
  const label=document.getElementById('ssLabel')?.value.trim()||'';
  const loc=document.getElementById('ssL')?.value;
  if(!sid){alert('Select a staff member.');return;}
  if(!startTime||!endTime){alert('Enter start and end times.');return;}
  // Block if staff has approved RTO on this day
  const rto=getRTO(sid,day);
  if(rto){
    alert('CANNOT SCHEDULE: '+gs(sid)?.name+' has approved time off on '+day+' ('+rto.start+(rto.end!==rto.start?' – '+rto.end:'')+', '+rto.type+'). Deny or cancel the time-off request before scheduling this day.');
    return;
  }
  const conflict=getOverlap(sid,day,startTime,endTime);
  if(conflict){
    alert('SCHEDULE CONFLICT: '+gs(sid)?.name+' already has a shift ('+conflict+') on '+day+' that overlaps by more than 1 minute. Adjust the times to continue.');
    return;
  }
  const newShift={startTime,endTime,label,location:loc,createdBy:isAdmin()?1:2,finalized:false};
  if(S.role==='manager'){
    const reason=document.getElementById('ssReason')?.value||'';
    // If any existing shift on that day is finalized, route to approval
    const dayShifts=S.schedule[sid]&&S.schedule[sid][day];
    const existingArr=dayShifts?(Array.isArray(dayShifts)?dayShifts:[dayShifts]):[];
    if(existingArr.some(x=>x.finalized)){
      S.scheduleRequests.push({id:Date.now(),staffId:sid,day,startTime,endTime,label,location:loc,requestedBy:2,reason,status:'Pending'});
      audit('Schedule','Schedule Change Requested',`${gs(sid)?.name} · ${day} ${startTime}-${endTime} @ ${loc} — awaiting admin approval`);
      alert('Change request submitted for admin approval.');cm();return;
    }
  }
  if(!S.schedule[sid])S.schedule[sid]={};
  // Store as array to support multiple shifts per day
  const existing=S.schedule[sid][day];
  if(!existing){S.schedule[sid][day]=[newShift];}
  else if(Array.isArray(existing)){existing.push(newShift);}
  else{S.schedule[sid][day]=[existing,newShift];}
  audit('Schedule','Shift Added',`${gs(sid)?.name} · ${day} ${startTime}-${endTime}${label?' ('+label+')':''} @ ${loc}`);
  cm();
}

      <div class="card">

          <div style="display:flex;align-items:center;gap:8px">
            <div class="pb" style="width:80px"><div class="pf" style="width:${pct}%"></div></div>

        </div>
      </div>

  }

  // ── ADMIN / MANAGER DASHBOARD ──────────────────────────
  const clocked=Object.keys(S.activeClock).length;
  const pending=S.timeOff.filter(t=>t.status==='Pending').length;

      ${(()=>{const rtoThisWeek=S.timeOff.filter(t=>t.status==='Approved'&&days.some(d=>getRTO(t.staffId,d)));return rtoThisWeek.length>0?`<div class="alert a-warn"><strong>Time Off This Week:</strong> ${rtoThisWeek.map(t=>{const s=gs(t.staffId);return(s?s.name.split(' ')[0]:'?')+' ('+t.type+' '+t.start+(t.end!==t.start?' – '+t.end:'')+')';}).join(', ')} — blocked from scheduling</div>`:''})()}
      ${S.staff.filter(s=>tp(s.id).pct<100).length>0?`<div class="alert a-warn">${S.staff.filter(s=>tp(s.id).pct<100).length} staff with incomplete training</div>`:''}

    </div>
    <div class="card">
      <div class="card-title">Live Clock Status</div>
      ${S.staff.filter(s=>s.role!=='Admin').map(s=>{

function renderTimeclock(){
  // DSPs only see their own clock card
  const staffToShow = S.role==='dsp'
    ? S.staff.filter(s=>s.id===5)   // demo: Devon Park is the DSP
    : S.staff.filter(s=>s.role!=='Admin');

  return`
  <div class="alert a-info" style="margin-bottom:0.9rem">${S.role==='dsp'?'Submit a shift report before clocking out.':'Staff must submit a shift report before clocking out.'}</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0.9rem;margin-bottom:1.2rem">
    ${staffToShow.map(s=>{
      const ac=S.activeClock[s.id];
      const hasRpt=ac&&S.shiftReports.some(r=>r.staffId===s.id&&r.date===ac.date&&r.shift===ac.shift);
      const blocked=ac&&!hasRpt;
      // Get upcoming shifts for clock-in dropdown
      const upcomingShifts=[];
      days.forEach(d=>{
        const dayData=S.schedule[s.id]&&S.schedule[s.id][d];
        if(!dayData)return;
        const shifts=Array.isArray(dayData)?dayData:[dayData];
        shifts.forEach(sh=>upcomingShifts.push({day:d,...sh}));
      });
      return`<div class="clock-card ${ac?(blocked?'blocked':'in'):''}">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:${ac?(blocked?'#A32D2D':'#0F6E56'):'#aaa'};margin-bottom:6px">${ac?(blocked?'Report required':'Clocked in'):'Off duty'}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div class="avatar" style="width:36px;height:36px;font-size:13px">${ini(s.name)}</div>
          <div><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:#666">${s.role} · ${s.location}</div></div>
        </div>
        ${ac?`
          <div style="font-size:11px;color:#666;margin-bottom:8px">
            Clocked in: <strong>${ac.clockIn}</strong><br>
            Shift: ${ac.shift||'—'} · ${ac.location}
          </div>
          ${blocked?`<div class="alert a-err" style="margin-bottom:8px;font-size:11px">Submit a shift report to unlock clock-out.</div>
          <button class="btn btn-primary" style="font-size:11px;width:100%;margin-bottom:6px" onclick="S.prefillStaff=${s.id};om('shiftReport')">Submit Shift Report</button>`:''}
          <button class="${hasRpt?'btn btn-danger':'btn btn-disabled'}" style="font-size:11px;width:100%" ${!hasRpt?'disabled':''} onclick="${hasRpt?`clockOut(${s.id})`:''}" >Clock Out</button>`
        :`
          ${upcomingShifts.length>0?`
            <div class="fg" style="margin-bottom:8px"><label class="fl">Select shift to clock in</label>
              <select class="fi" id="shiftSel_${s.id}">
                ${upcomingShifts.map(sh=>`<option value="${sh.startTime}|${sh.endTime}|${sh.location}">${sh.day} ${sh.startTime}–${sh.endTime} @ ${sh.location}${sh.label?' ('+sh.label+')':''}</option>`).join('')}
              </select>
            </div>
            <button class="btn btn-success" style="font-size:11px;width:100%" onclick="
              const sel=document.getElementById('shiftSel_${s.id}');
              const parts=(sel?.value||'').split('|');
              if(parts.length>=3)clockIn(${s.id},parts[0]+'-'+parts[1],parts[2]);
              else{S.clockInStaffId=${s.id};om('clockIn');}
            ">Clock In</button>`
          :`<div style="font-size:11px;color:#aaa;margin-bottom:8px">No scheduled shifts this week.</div>
           <button class="btn btn-success" style="font-size:11px;width:100%" onclick="S.clockInStaffId=${s.id};om('clockIn')">Clock In Manually</button>`}
        `}
      </div>`;
    }).join('')}
  </div>
  ${S.role!=='dsp'?`<div class="card">
    <div class="card-title">All Clock Records</div>
    <table><tr><th>Staff</th><th>Date</th><th>Shift</th><th>Location</th><th>In</th><th>Out</th><th>Hours</th><th>Report</th></tr>
    ${S.clockRecords.map(r=>{const s=gs(r.staffId);let hrs='—';
      if(r.clockIn&&r.clockOut){const[ih,im]=r.clockIn.split(':').map(Number);const[oh,om2]=r.clockOut.split(':').map(Number);hrs=((oh*60+om2-ih*60-im)/60).toFixed(1)+'h';}
      return`<tr><td>${s?s.name:'—'}</td><td>${r.date}</td><td>${r.shift}</td><td>${r.location}</td><td>${r.clockIn}</td><td>${r.clockOut||'<span style="color:#0F6E56;font-weight:600">Active</span>'}</td><td>${hrs}</td><td><span class="badge ${r.reportSubmitted?'bs':'bw'}">${r.reportSubmitted?'Filed':'Pending'}</span></td></tr>`;
    }).join('')}</table>
  </div>`:`<div class="card">
    <div class="card-title">My Clock History</div>
    <table><tr><th>Date</th><th>Shift</th><th>Location</th><th>In</th><th>Out</th><th>Hours</th><th>Report</th></tr>
    ${S.clockRecords.filter(r=>r.staffId===5).map(r=>{let hrs='—';
      if(r.clockIn&&r.clockOut){const[ih,im]=r.clockIn.split(':').map(Number);const[oh,om2]=r.clockOut.split(':').map(Number);hrs=((oh*60+om2-ih*60-im)/60).toFixed(1)+'h';}
      return`<tr><td>${r.date}</td><td>${r.shift}</td><td>${r.location}</td><td>${r.clockIn}</td><td>${r.clockOut||'<span style="color:#0F6E56;font-weight:600">Active</span>'}</td><td>${hrs}</td><td><span class="badge ${r.reportSubmitted?'bs':'bw'}">${r.reportSubmitted?'Filed':'Pending'}</span></td></tr>`;
    }).join('')}</table>
  </div>`}`;
}

function renderTraining(){
  if(S.currentTrainStaff){
    const stf=gs(S.currentTrainStaff);
    const prog=S.trainingProgress[S.currentTrainStaff]||{completedModules:[],signedPP:false,signedFinal:false};
    const allModsDone=prog.completedModules.length===6;
    if(S.modal==='quiz'){
      const mod=TM[S.currentModuleIdx];const sub=S.quizSubmitted;
      const allOk=sub&&mod.questions.every((q,i)=>S.quizAnswers[i]===q.ans);
      return`<button class="btn" onclick="S.modal=null;render()">← Back</button>
        <div class="card" style="margin-top:0.9rem">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">Quiz: ${mod.title}</div>
          <div style="font-size:12px;color:#666;margin-bottom:1.2rem">Answer all correctly to complete this module.</div>
          ${mod.questions.map((q,qi)=>{const sel=S.quizAnswers[qi];return`<div style="margin-bottom:1rem">
            <div style="font-size:12px;font-weight:600;margin-bottom:6px">${qi+1}. ${q.q}</div>
            ${q.opts.map((o,oi)=>`<label style="display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12px;${sub&&oi===q.ans?'background:#EAF3DE':sub&&oi===sel&&oi!==q.ans?'background:#FCEBEB':''}">
              <input type="radio" name="q${qi}" ${sel===oi?'checked':''} ${sub?'disabled':''} onchange="S.quizAnswers[${qi}]=${oi};render()"> ${o}</label>`).join('')}
          </div>`;}).join('')}
          ${sub?(allOk?`<div class="alert a-ok">All correct! Module complete.</div><button class="btn btn-primary" onclick="const p=S.trainingProgress[S.currentTrainStaff];if(!p.completedModules.includes(${TM[S.currentModuleIdx].id}))p.completedModules.push(${TM[S.currentModuleIdx].id});const _mod=TM[S.currentModuleIdx];audit('Training','Module Completed',(gs(S.currentTrainStaff)?.name||'?')+' · Module '+_mod.id+': '+_mod.title);S.modal=null;S.quizAnswers={};S.quizSubmitted=false;render()">Complete Module</button>`:
          `<div class="alert a-err">Some answers incorrect. Try again.</div><button class="btn btn-primary" onclick="S.quizAnswers={};S.quizSubmitted=false;render()">Retry Quiz</button>`):
          `<button class="btn btn-primary" onclick="S.quizSubmitted=true;render()">Submit Quiz</button>`}
        </div>`;
    }
    return`
      <button class="btn" onclick="S.currentTrainStaff=null;render()">← All Staff</button>
      <div class="card" style="margin-top:0.9rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.1rem">
          <div class="avatar" style="width:42px;height:42px;font-size:15px">${ini(stf.name)}</div>
          <div><div style="font-size:15px;font-weight:600">${stf.name}</div>
            <div style="font-size:12px;color:#666">Progress: ${tp(S.currentTrainStaff).pct}%</div>
            <div class="pb" style="width:160px;margin-top:3px"><div class="pf" style="width:${tp(S.currentTrainStaff).pct}%"></div></div>
          </div>
        </div>
        ${TM.map((mod,idx)=>{const done=prog.completedModules.includes(mod.id);return`<div style="border:0.5px solid rgba(0,0,0,0.1);border-left:${done?'3px solid #639922':'3px solid rgba(0,0,0,0.1)'};border-radius:7px;padding:0.9rem;margin-bottom:0.65rem;display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:12px;font-weight:600">Module ${mod.id}: ${mod.title}</div></div>
          ${done?'<span class="badge bs">Complete</span>':`<button class="btn btn-primary" style="font-size:11px" onclick="S.currentModuleIdx=${idx};S.quizAnswers={};S.quizSubmitted=false;S.modal='quiz';render()">Start</button>`}
        </div>`;}).join('')}
        <hr>
        <div style="font-size:13px;font-weight:600;margin-bottom:0.9rem">Policies & Procedures Manual</div>
        <div style="border:0.5px solid rgba(0,0,0,0.1);border-left:${prog.signedPP?'3px solid #639922':'3px solid rgba(0,0,0,0.1)'};border-radius:7px;padding:0.9rem;margin-bottom:0.65rem;display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:12px;font-weight:600">Read & Sign P&P Manual</div><div style="font-size:11px;color:#666">Must complete all modules first</div></div>
          ${prog.signedPP?'<span class="badge bs">Signed</span>':(allModsDone?`<button class="btn btn-primary" style="font-size:11px" onclick="om('signPP')">Review & Sign</button>`:'<span class="badge bg">Locked</span>')}
        </div>
        ${prog.signedPP?`<div style="border:0.5px solid rgba(0,0,0,0.1);border-left:${prog.signedFinal?'3px solid #639922':'3px solid rgba(0,0,0,0.1)'};border-radius:7px;padding:0.9rem;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:12px;font-weight:600">Final Comprehensive Acknowledgment</div>
          ${prog.signedFinal?'<span class="badge bs">Signed</span>':`<button class="btn btn-primary" style="font-size:11px" onclick="om('signFinal')">Sign</button>`}
        </div>`:''}
        ${tp(S.currentTrainStaff).pct===100?'<div class="alert a-ok" style="margin-top:0.9rem">Training fully complete. All records saved.</div>':''}
      </div>`;
  }
  const canManage=isAdmin();
  return`
    <div class="sec-hdr"><div style="font-size:12px;color:#666">Select a staff member to manage training</div></div>
    ${!canManage?`<div class="read-only-banner">👁 Only admins can manage training records.</div>`:''}
    <div class="g2">${S.staff.map(s=>{const{pct}=tp(s.id);return`<div class="card" style="cursor:${canManage?'pointer':'default'}" onclick="${canManage?`S.currentTrainStaff=${s.id};render()`:''}" >
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.9rem">
        <div class="avatar" style="width:40px;height:40px;font-size:14px">${ini(s.name)}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:#666">${s.role}</div></div>
        <span class="badge ${pct===100?'bs':'bw'}">${pct}%</span>
      </div>
      <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
      <div style="font-size:11px;color:#888;margin-top:5px">${(S.trainingProgress[s.id]||{completedModules:[]}).completedModules.length}/6 modules · ${pct===100?'Certified':'In progress'}</div>
    </div>`;}).join('')}</div>`;
}

// ── CSV HELPERS ───────────────────────────────────────────
function escCSV(v){if(v==null)return'';const s=String(v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}
function rowCSV(arr){return arr.map(escCSV).join(',');}
function downloadCSV(filename,rows){
  try{
    const csv='\uFEFF'+rows.map(r=>rowCSV(r)).join('\r\n'); // BOM for Excel UTF-8
    // Try Blob + object URL first (native browsers)
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    // Fallback: data URI (works in sandboxed iframes)
    try{
      const csv=rows.map(r=>rowCSV(r)).join('\r\n');
      const encoded='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
      const a=document.createElement('a');a.href=encoded;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
    }catch(e2){
      // Last resort: open CSV in new tab so user can copy/save manually
      const csv=rows.map(r=>rowCSV(r)).join('\r\n');
      const w=window.open('','_blank');
      if(w){w.document.write('<pre>'+csv.replace(/</g,'&lt;')+'</pre>');w.document.title=filename;}
      else{alert('Export blocked by browser. Please allow popups for this page, or copy the data manually.');}
    }
  }
}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
}

function processImportRows(rows,type){
  let added=0,skipped=0;
  rows.forEach(row=>{
    if(type==='staff'){
      if(!row.name||!row.name.trim()){skipped++;return;}
      if(S.staff.find(s=>s.name.trim().toLowerCase()===row.name.trim().toLowerCase())){skipped++;return;}
      const id=Date.now()+Math.random();
      S.staff.push({id,name:row.name.trim(),role:row.role||'Support Worker',email:row.email||'',phone:row.phone||'',location:row.location||'Home A',startDate:row.startDate||'',dob:row.dob||'',certs:[],status:'active',docs:[]});
      S.trainingProgress[id]={completedModules:[],signedPP:false,signedFinal:false};
      added++;
    } else {
      if(!row.name||!row.name.trim()){skipped++;return;}
      if(S.clients.find(c=>c.name.trim().toLowerCase()===row.name.trim().toLowerCase())){skipped++;return;}
      S.clients.push({id:Date.now()+Math.random(),name:row.name.trim(),dx:row.dx||'',location:row.location||'Home A',dob:row.dob||'',guardian:row.guardian||'',primary:row.primary||'',notes:row.notes||'',status:'active',docs:[]});
      added++;
    }
  });
  return{added,skipped};
}

  const el=document.getElementById(elId);
  if(el)el.innerHTML=`<div class="alert ${added>0?'a-ok':'a-warn'}">${added} record(s) imported, ${skipped} skipped (duplicates or blank rows).</div>`;
}

// Selection state: S.exportSel = { shiftReports: Set, incidents: Set, clockRecords: Set, staff: Set, clients: Set }
function getExSel(key){if(!S.exportSel)S.exportSel={};if(!S.exportSel[key])S.exportSel[key]=new Set();return S.exportSel[key];}
function toggleSel(key,id){const s=getExSel(key);s.has(id)?s.delete(id):s.add(id);render();}
function selAll(key,ids){const s=getExSel(key);ids.forEach(id=>s.add(id));render();}
function deselAll(key){if(S.exportSel)S.exportSel[key]=new Set();render();}
function selCount(key){return getExSel(key).size;}

function applyFilters(){
  const fs=S.exportFilters||{};
  const fSR=S.shiftReports.filter(r=>{
    if(fs.dateFrom&&r.date<fs.dateFrom)return false;
    if(fs.dateTo&&r.date>fs.dateTo)return false;
    if(fs.staffId&&r.staffId!=fs.staffId)return false;
    if(fs.location&&r.location!==fs.location)return false;
    return true;
  });
  const fINC=S.incidents.filter(i=>{
    if(fs.dateFrom&&i.date<fs.dateFrom)return false;
    if(fs.dateTo&&i.date>fs.dateTo)return false;
    if(fs.staffId&&i.staffId!=fs.staffId)return false;
    if(fs.clientId&&i.clientId!=fs.clientId)return false;
    return true;
  });
  const fCLK=S.clockRecords.filter(r=>{
    if(fs.dateFrom&&r.date<fs.dateFrom)return false;
    if(fs.dateTo&&r.date>fs.dateTo)return false;
    if(fs.staffId&&r.staffId!=fs.staffId)return false;
    if(fs.location&&r.location!==fs.location)return false;
    return true;
  });
  const fSTF=S.staff.filter(s=>{
    if(fs.location&&s.location!==fs.location)return false;
    if(fs.staffId&&s.id!=fs.staffId)return false;
    return true;
  });
  const fCLI=S.clients.filter(c=>{
    if(fs.location&&c.location!==fs.location)return false;
    if(fs.clientId&&c.id!=fs.clientId)return false;
    return true;
  });
  return{fSR,fINC,fCLK,fSTF,fCLI};
}

        </tr>
        ${visits.length===0?`<tr><td colspan="11" style="text-align:center;color:#aaa;padding:1.5rem">No completed visits match current filters.</td></tr>`:''}
        ${visits.map(r=>{
          const s=gs(r.staffId);
          // Try to match client from shift reports on same date/shift
          const rpt=S.shiftReports.find(x=>x.staffId===r.staffId&&x.date===r.date);
          const clients=rpt&&rpt.clientReports?rpt.clientReports.map(cr=>gc(cr.clientId)).filter(Boolean):[];
          // If clientId filter active, only show that client
          const showClients=evvFs.clientId?clients.filter(c=>c.id==evvFs.clientId):clients;
          const svcCode=S.evvSettings?.svcCode||'S5125';
          const addr=S.evvSettings?.address?S.evvSettings.address+(S.evvSettings.city?', '+S.evvSettings.city:''):r.location;
          let hrs='';if(r.clockIn&&r.clockOut){const[ih,im]=r.clockIn.split(':').map(Number);const[oh,om2]=r.clockOut.split(':').map(Number);hrs=((oh*60+om2-ih*60-im)/60).toFixed(2)+'h';}
          const missingNPI=!s?.evvNPI;const missingMedID=showClients.some(c=>!c.medicaidId);
          const status=missingNPI||missingMedID?'⚠ Missing IDs':'✓ Ready';
          // Render one row per client, or one row if no clients linked
          const rowClients=showClients.length>0?showClients:[null];
          return rowClients.map(c=>`<tr>

            <td><input class="fi" style="width:110px;font-size:10px;padding:3px 6px" placeholder="NPI/ID" value="${s?.evvNPI||''}" onchange="const st=S.staff.find(x=>x.id===${r.staffId});if(st)st.evvNPI=this.value"></td>
            <td style="font-size:11px">${c?c.name:'—'}</td>
            <td>${c?`<input class="fi" style="width:110px;font-size:10px;padding:3px 6px" placeholder="Medicaid ID" value="${c.medicaidId||''}" onchange="const cl=S.clients.find(x=>x.id===${c.id});if(cl)cl.medicaidId=this.value">`:'<span style="color:#aaa">—</span>'}</td>
            <td><select class="fi" style="font-size:10px;padding:3px 5px;width:80px" onchange="(S.evvSettings=S.evvSettings||{}).svcCode=this.value">
              ${['S5125','S5126','S5120','S5115','G0299','G0300'].map(cd=>`<option ${svcCode===cd?'selected':''}>${cd}</option>`).join('')}
            </select></td>
            <td>${r.clockIn}</td><td>${r.clockOut||'—'}</td><td>${hrs}</td>
            <td style="font-size:10px;max-width:120px;overflow:hidden">${addr}</td>
            <td><span class="badge ${status.includes('✓')?'bs':'bw'}" style="font-size:10px;white-space:nowrap">${status}</span></td>
          </tr>`).join('');
        }).join('')}
      </table>
    </div>
    <div class="alert a-warn" style="margin-top:0.9rem;font-size:11px">
      <strong>Required EVV fields per UEVV Spec v1.7:</strong> Caregiver NPI/ID · Client Medicaid ID · Service Code (HCPCS) · Service Date · Start Time · End Time · Service Location (address or GPS). Enter missing IDs above then export. Submit the CSV at <strong>evv.medicaid.utah.gov</strong>. Questions: dmhf_evv@utah.gov
    </div>
  </div>`;
}

function saveEVVSettings(){

  S.evvSettings.npi=document.getElementById('evvNPI')?.value||'';

  S.evvSettings.svcCode=document.getElementById('evvSvcCode')?.value||'S5125';
  S.evvSettings.address=document.getElementById('evvAddr')?.value||'';

  alert('Provider settings saved.');
}

function exportEVVcsv(){
  const evvFs=S.evvFilters||{};
  // Required UEVV CSV columns per Technical Spec v1.7
  const rows=[['provider_npi(req)','provider_id(req)','caregiver_id(req)','caregiver_npi','member_medicaid_id(req)','service_code(req)','service_date(req)','begin_time(req)','end_time(req)','begin_address1','begin_city','end_address1','end_city','agency_name']];
  const npi=S.evvSettings?.npi||'';
  const provId=S.evvSettings?.provId||'';
  const agency=S.evvSettings?.agency||'Perfect Stay Group';
  const svcCode=S.evvSettings?.svcCode||'S5125';
  const addr=S.evvSettings?.address||'';
  const city=S.evvSettings?.city||'';
  S.clockRecords.filter(r=>{
    if(!r.clockOut)return false;
    if(evvFs.dateFrom&&r.date<evvFs.dateFrom)return false;
    if(evvFs.dateTo&&r.date>evvFs.dateTo)return false;
    if(evvFs.staffId&&r.staffId!=evvFs.staffId)return false;
    return true;
  }).forEach(r=>{
    const s=gs(r.staffId);
    const rpt=S.shiftReports.find(x=>x.staffId===r.staffId&&x.date===r.date);
    const clients=rpt&&rpt.clientReports?rpt.clientReports.map(cr=>gc(cr.clientId)).filter(Boolean):[];
    const rowClients=clients.length>0?clients:[null];
    rowClients.forEach(c=>{
      if(evvFs.clientId&&c&&c.id!=evvFs.clientId)return;
      rows.push([
        npi,provId,
        s?s.id:'',s?.evvNPI||'',
        c?.medicaidId||'',
        svcCode,r.date,
        r.clockIn,r.clockOut,
        addr,city,addr,city,agency
      ]);
    });
  });
  downloadCSV('sonroc_evv_utah_'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

  const c=gc(clientId);
  const month=S.marMonth||'';
  const entries=S.marEntries.filter(e=>e.clientId===clientId&&(!month||e.givenDate.startsWith(month)));
  const rows=[['Client','Date','Medication','Dose','Route','Scheduled Time','Given Time','Staff','Status','Notes','Refusal Reason']];
  entries.forEach(e=>{const staff=gs(e.staffId);rows.push([c?c.name:'',e.givenDate,e.medName,e.dose,e.route,e.scheduledTime,e.givenTime||'',staff?staff.name:'',e.status,e.notes||'',e.refusalReason||'']);});
  downloadCSV('sonroc_MAR_'+(c?c.name.replace(/\s/g,'_'):'')+'_'+month+'.csv',rows);
}
function exportAllMAR(){
  const month=S.marMonth||'';
  const rows=[['Client','Date','Medication','Dose','Route','Scheduled Time','Given Time','Staff','Status','Notes','Refusal Reason']];
  S.marEntries.filter(e=>!month||e.givenDate.startsWith(month)).forEach(e=>{const c=gc(e.clientId);const staff=gs(e.staffId);rows.push([c?c.name:'',e.givenDate,e.medName,e.dose,e.route,e.scheduledTime,e.givenTime||'',staff?staff.name:'',e.status,e.notes||'',e.refusalReason||'']);});
  downloadCSV('sonroc_MAR_all_'+month+'.csv',rows);
}
function exportMARprintable(clientId){
  const c=gc(clientId);if(!c)return;
  const month=S.marMonth||'';
  const meds=(S.medications[clientId]||[]).filter(m=>m.active);
  const entries=S.marEntries.filter(e=>e.clientId===clientId&&e.givenDate.startsWith(month));
  let html='<html><head><title>MAR - '+c.name+' - '+month+'</title><style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:16px}h2{font-size:13px;margin-top:16px}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid #ccc;padding:4px 6px;text-align:left}th{background:#f0f0f0;font-size:10px}</style></head><body>';
  html+='<h1>Medication Administration Record</h1>';
  html+='<p><strong>Client:</strong> '+c.name+' | <strong>DOB:</strong> '+(c.dob||'—')+' | <strong>Location:</strong> '+c.location+' | <strong>Month:</strong> '+month+'</p>';
  html+='<h2>Active Medications</h2><table><tr><th>Medication</th><th>Dose</th><th>Route</th><th>Frequency</th><th>Scheduled</th><th>Prescriber</th></tr>';
  meds.forEach(m=>{html+='<tr><td>'+m.name+'</td><td>'+m.dose+'</td><td>'+m.route+'</td><td>'+m.frequency+'</td><td>'+m.scheduledTimes.join(', ')+'</td><td>'+m.prescriber+'</td></tr>';});
  html+='</table><h2>Administration Log</h2><table><tr><th>Date</th><th>Medication</th><th>Dose</th><th>Scheduled</th><th>Given</th><th>Staff</th><th>Status</th><th>Notes</th></tr>';
  entries.forEach(e=>{const staff=gs(e.staffId);html+='<tr><td>'+e.givenDate+'</td><td>'+e.medName+'</td><td>'+e.dose+'</td><td>'+e.scheduledTime+'</td><td>'+(e.givenTime||'—')+'</td><td>'+(staff?staff.name:'—')+'</td><td>'+e.status+'</td><td>'+(e.notes||'')+(e.refusalReason?' Reason: '+e.refusalReason:'')+'</td></tr>';});
  html+='</table><p style="margin-top:20px;font-size:10px;color:#888">Generated '+new Date().toLocaleString()+' — Sonroc Care / Perfect Stay Group</p></body></html>';
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();w.print();}
}
